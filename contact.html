<!DOCTYPE html>
<html>
<head>
    <title>Contact Us | Philippines Tommy Hilfigef</title>
    <script>
        function showConfirmation(event) {
            event.preventDefault(); 
            alert("Thank you for contacting us! We will get back to you shortly.");
        }
    </script>
</head>
<body bgcolor="#F0F0F0" link="#00174F" vlink="#00174F">

    <table width="100%" border="0" cellspacing="0" cellpadding="20" bgcolor="#00174F">
        <tr>
            <td align="center">
                
                <img src="main/tommy2.jpg/2560px-Tommy_Hilfiger_logo.svg.png" alt="Tommy Hilfiger Logo" width="150" style="display:block; margin: 0 auto 10px auto;" />
                <font color="#FFFFFF" face="Arial, Helvetica, sans-serif" size="6">
                    <b>TOMMY </b> 
                    <font bgcolor="#FFFFFF" color="#00174F">&nbsp;</font>
                    <font bgcolor="#CC0000" color="#CC0000">&nbsp;</font>
                    <b> HILFIGER</b>
                </font>
            </td>
        </tr>
    </table>

    <br><br>

    <table width="600" border="0" cellspacing="0" cellpadding="0" align="center" bgcolor="#FFFFFF">
        <tr>
            <td style="border: 10px solid #00174F;">
                
                <table width="100%" border="0" cellspacing="0" cellpadding="30">
                    <tr>
                        <td>
                            <font face="Georgia, Times New Roman, serif" size="5" color="#00174F">
                                <b>CONTACT OUR FLAGSHIP</b>
                            </font>
                            <hr color="#CC0000" size="4" width="50" align="left">
                            
                            <p>
                                <font face="Arial, Helvetica, sans-serif" size="2" color="#333333">
                                    Have a question about your order or our latest collection? 
                                    Drop us a line below and our team will get back to you shortly.
                                </font>
                            </p>

                            <form onsubmit="showConfirmation(event)">
                                <font face="Arial, Helvetica, sans-serif" size="2">
                                    <b>NAME</b><br>
                                    <input type="text" name="name" size="60"><br><br>

                                    <b>EMAIL ADDRESS</b><br>
                                    <input type="email" name="email" size="60"><br><br>

                                    <b>SUBJECT</b><br>
                                    <select name="subject">
                                        <option>Online Orders</option>
                                        <option>Product Inquiry</option>
                                        <option>Store Locator</option>
                                    </select><br><br>

                                    <b>MESSAGE</b><br>
                                    <textarea name="message" rows="8" cols="56"></textarea><br><br>

                                    <input type="submit" value="   SEND MESSAGE   ">
                                </font>
                            </form>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

    <br><br>

    <table width="100%" border="0" cellspacing="0" cellpadding="20">
        <tr>
            <td align="center">
                <font face="Arial, sans-serif" size="1" color="#999999">
                    &copy; 2026 TOMMY HILFIGER LICENSING, LLC. ALL RIGHTS RESERVED.
                </font>
            </td>
        </tr>
    </table>

</body>
</html>
