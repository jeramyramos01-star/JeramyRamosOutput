<!DOCTYPE html>
<html>
<head>
    <title>Register Account</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div style="background: white; padding: 40px 60px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 380px; text-align: center; border-top: 6px solid #0056b3;">
        <h2 style="margin-bottom: 30px; font-weight: bold; font-size: 28px; color: #003366; letter-spacing: 2px;">CREATE ACCOUNT</h2>

        <input type="text" id="firstname" placeholder="First Name" style="width: 100%; padding: 12px 14px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">
        <input type="text" id="middlename" placeholder="Middle Name" style="width: 100%; padding: 12px 14px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">
        <input type="text" id="lastname" placeholder="Last Name" style="width: 100%; padding: 12px 14px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">
        <input type="number" id="age" placeholder="Age" style="width: 100%; padding: 12px 14px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">
        <input type="text" id="address" placeholder="Address" style="width: 100%; padding: 12px 14px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">
        <input type="text" id="location" placeholder="Location" style="width: 100%; padding: 12px 14px; margin: 8px 0 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">

        <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 12px 14px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">
        <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 12px 14px; margin: 8px 0 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s;">

        <div style="display: flex; justify-content: space-between;">
            <button onclick="clearForm()" style="background-color: #b30000; border: none; color: white; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 48%; transition: background-color 0.3s;">
                Clear
            </button>
            <button onclick="register()" style="background-color: #003366; border: none; color: white; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 48%; transition: background-color 0.3s;">
                Register
            </button>
        </div>
    </div>

<script>
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.onfocus = () => {
            input.style.borderColor = "#0056b3";
            input.style.boxShadow = "0 0 6px #0056b3";
        };
        input.onblur = () => {
            input.style.borderColor = "#ddd";
            input.style.boxShadow = "none";
        };
    });

    function clearForm() {
        inputs.forEach(input => input.value = '');
    }

    function register() {
        var username = document.getElementById("username").value.trim();
        var password = document.getElementById("password").value.trim();

        if (username === "" || password === "") {
            alert("Please enter username and password.");
            return;
        }

        localStorage.setItem("username", username);
        localStorage.setItem("password", password);

        var check = confirm("☑ Successfully created an account!");
        if (check) {
            window.location.href = "login.html";
        }
    }
</script>

</body>
</html>
